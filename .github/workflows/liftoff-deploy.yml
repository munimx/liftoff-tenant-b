name: Liftoff Deploy

on:
  push:
    branches: ['main']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Dockerfile \
            -t registry.digitalocean.com/liftoff-2a1c5c9e7b/testnewui/production:$IMAGE_TAG \
            .
          docker push registry.digitalocean.com/liftoff-2a1c5c9e7b/testnewui/production:$IMAGE_TAG

      - name: Notify Liftoff
        if: always()
        env:
          IMAGE_TAG: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST https://aniya-preservable-harriett.ngrok-free.dev/api/v1/webhooks/deploy-complete \
            -H "X-Liftoff-Secret: ${{ secrets.LIFTOFF_DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"environmentId\":\"cmplizosm0007szjpjefw5ofy\",\"imageUri\":\"registry.digitalocean.com/liftoff-2a1c5c9e7b/testnewui/production:$IMAGE_TAG\",\"commitSha\":\"$GITHUB_SHA\",\"status\":\"$JOB_STATUS\",\"runUrl\":\"$RUN_URL\"}"
